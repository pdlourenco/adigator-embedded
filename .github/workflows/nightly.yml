# CI plan Phase 3 — nightly suites (docs/CI_PLAN.md §3.1).
#
# NOTE: GitHub runs `schedule` triggers only from the repository's DEFAULT
# branch. While development happens on 'embedded', the cron below is inert
# unless this file also exists on the default branch (or 'embedded' is made
# the default). Until then, run it manually via workflow_dispatch (any
# branch) or rely on the push trigger after merges to 'embedded'.
name: Nightly

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
  push:
    branches: [embedded]
    paths:
      - '.github/workflows/nightly.yml' # validate workflow edits on merge

permissions:
  contents: read

jobs:
  # TS-S-03: full unit+integration suites on the supported-release floor
  # and the latest release. Separate jobs: releases cannot share an install.
  release-matrix:
    strategy:
      fail-fast: false
      matrix:
        release: [R2022a, latest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.release }}
          cache: true
      - name: Unit tests
        uses: matlab-actions/run-tests@v2
        with:
          select-by-folder: tests/unit
          test-results-junit: results/unit-${{ matrix.release }}.xml
      - name: Integration tests
        if: success()
        uses: matlab-actions/run-tests@v2
        with:
          select-by-folder: tests/integration
          test-results-junit: results/integration-${{ matrix.release }}.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-results-${{ matrix.release }}
          path: results
          if-no-files-found: ignore

  # TS-S-01 (examples) + TS-S-02 (codegen) + the Coder-gated numeric checks
  # of TS-I-02. One job, one install, with the licensed products; the tests
  # themselves skip via assumption if a product is missing from the license.
  full-products:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: matlab-actions/setup-matlab@v2
        with:
          release: latest
          cache: true
          products: >-
            Optimization_Toolbox
            MATLAB_Coder
      - name: Integration tests (Coder-enabled, runs TS-I-02 numeric l/i checks)
        uses: matlab-actions/run-tests@v2
        with:
          select-by-folder: tests/integration
          test-results-junit: results/integration-products.xml
      - name: System tests (examples + codegen)
        if: success()
        uses: matlab-actions/run-tests@v2
        with:
          select-by-folder: tests/system
          test-results-junit: results/system.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-results-products
          path: results
          if-no-files-found: ignore
