# Build the LaTeX user guide; commit the regenerated PDF only on master.
#
# Separate from ci.yml and NOT a required gate. Path-filtered to the guide
# sources (docs/userguide/) so it only runs when those change
# (docs/CI_PLAN.md §3.1).
#
# The committed PDF is a non-reproducible binary, so committing it to every PR
# branch made parallel/stacked guide PRs collide on it (an unmergeable binary
# conflict — #149). So:
#   - pull_request  -> BUILD the PDF (catches LaTeX errors) and upload it as a
#                      downloadable artifact for review; commit NOTHING.
#   - push (master) -> BUILD and COMMIT the one tracked PDF. The built-in
#                      GITHUB_TOKEN cannot push to the protected branch, so the
#                      job mints an installation token from a GitHub App
#                      (client id below) using the PDF_APP_PRIVATE_KEY secret and
#                      pushes with that. If the secret is absent the token/commit
#                      steps skip cleanly and the PDF simply refreshes on the next
#                      master build once it is configured.
# Restricted to same-repo events: a fork PR's head branch is not in this repo and
# its token is read-only, so it is skipped rather than failed.
#
# One-time setup for the master auto-commit:
#   1. Install the GitHub App on this repo with Contents: write (metadata: read).
#   2. Add its private key as the repo secret PDF_APP_PRIVATE_KEY.
#   3. Add the App to master's branch-protection bypass list.
name: User Guide PDF

on:
  workflow_dispatch:   # manual "Run workflow" on a branch (default master):
                       # rebuild + commit the PDF like a master push.
  push:
    branches: [master]
    paths:
      - 'docs/userguide/**'
  pull_request:
    paths:
      - 'docs/userguide/**'

permissions:
  contents: write

jobs:
  build-pdf:
    # run on master push, manual dispatch, and same-repo PRs; skip fork PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      # hoisted so the step `if:` can test it (secrets are not available in `if`)
      APP_KEY: ${{ secrets.PDF_APP_PRIVATE_KEY }}
    steps:
      # master only: mint a short-lived App installation token that can push to
      # the protected branch. Skipped cleanly until PDF_APP_PRIVATE_KEY is set.
      - name: Generate App token
        id: app-token
        if: ${{ github.event_name != 'pull_request' && env.APP_KEY != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: 'Iv23lioJAoBr9stfwapb'   # GitHub App client id (not a secret)
          private-key: ${{ secrets.PDF_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          # PR: the head branch. push: github.head_ref is empty, so fall back to
          # the pushed ref name (master).
          ref: ${{ github.head_ref || github.ref_name }}
          # master commit pushes with the App token (protected branch); PRs only
          # build (no push) so the default token is fine.
          token: ${{ steps.app-token.outputs.token || github.token }}

      # Full TeXLive in a container; latexmk runs the pdflatex/bibtex/pdflatex
      # passes (the same sequence as docs/userguide/makepdf.sh). The PDF is
      # built in the working directory (docs/userguide/), alongside its source.
      #
      # Reproducible timestamps (#115): SOURCE_DATE_EPOCH + FORCE_SOURCE_DATE make
      # pdftex stamp fixed /CreationDate + /ModDate + /ID, so an unchanged source
      # yields a byte-identical PDF and the commit step below no-ops. latex-action
      # runs latexmk INSIDE a Docker container, so a step-level `env:` (which sets
      # only the runner's environment) never reaches the container's pdftex — the
      # bug behind #115. Exporting in `pre_compile`, which runs in the same
      # in-container shell as the compile, is what actually reaches pdftex
      # (verified: the dates then pin to 2023-11-14T22:13:20Z). Keep this value in
      # sync with docs/userguide/makepdf.sh so both pin the same timestamps.
      - name: Compile user guide
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: docs/userguide
          root_file: ADiGatorUserGuide.tex
          pre_compile: "export SOURCE_DATE_EPOCH=1700000000 FORCE_SOURCE_DATE=1"

      # PRs: publish the built PDF for review; do NOT commit it (that is what
      # caused the feature-branch churn / stacked-merge conflicts).
      - name: Upload PDF artifact (pull requests)
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: ADiGatorUserGuide-pdf
          path: docs/userguide/ADiGatorUserGuide.pdf
          if-no-files-found: error

      # master: commit the regenerated PDF (the single tracked copy) with the App
      # token minted above. [skip ci] is load-bearing - App-token pushes DO
      # re-trigger workflows (unlike GITHUB_TOKEN), so it prevents a push loop.
      - name: Commit regenerated PDF (master push / manual dispatch)
        if: ${{ github.event_name != 'pull_request' && steps.app-token.outputs.token != '' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: docs/userguide/ADiGatorUserGuide.pdf
          commit_message: 'docs(userguide): regenerate PDF [skip ci]'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: '41898282+github-actions[bot]@users.noreply.github.com'
