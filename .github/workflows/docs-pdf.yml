# Build the LaTeX user guide; commit the regenerated PDF only on master.
#
# Separate from ci.yml and NOT a required gate. Path-filtered to the guide
# sources (docs/userguide/) so it only runs when those change
# (docs/CI_PLAN.md §3.1).
#
# The committed PDF is a non-reproducible binary, so committing it to every PR
# branch made parallel/stacked guide PRs collide on it (an unmergeable binary
# conflict — #149). So:
#   - pull_request  -> BUILD the PDF (catches LaTeX errors) and upload it as a
#                      downloadable artifact for review; commit NOTHING.
#   - push (master) -> BUILD and COMMIT the one tracked PDF, using PDF_PUSH_TOKEN
#                      (a PAT / GitHub App token allowed to push to the protected
#                      branch; the built-in GITHUB_TOKEN cannot). If the secret is
#                      absent the commit step is skipped cleanly and the PDF is
#                      simply refreshed on the next master build once it is set.
# Restricted to same-repo events: a fork PR's head branch is not in this repo and
# its token is read-only, so it is skipped rather than failed.
name: User Guide PDF

on:
  push:
    branches: [master]
    paths:
      - 'docs/userguide/**'
  pull_request:
    paths:
      - 'docs/userguide/**'

permissions:
  contents: write

jobs:
  build-pdf:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      PDF_PUSH_TOKEN: ${{ secrets.PDF_PUSH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          # PR: the head branch. push: github.head_ref is empty, so fall back to
          # the pushed ref name (master).
          ref: ${{ github.head_ref || github.ref_name }}
          # master commit needs a token that can push to the protected branch;
          # PRs only build (no push) so the default token is fine.
          token: ${{ secrets.PDF_PUSH_TOKEN || github.token }}

      # Full TeXLive in a container; latexmk runs the pdflatex/bibtex/pdflatex
      # passes (the same sequence as docs/userguide/makepdf.sh). The PDF is
      # built in the working directory (docs/userguide/), alongside its source.
      # SOURCE_DATE_EPOCH + FORCE_SOURCE_DATE make pdftex stamp fixed dates, so
      # an unchanged source yields a byte-identical PDF and the commit step
      # below no-ops - a push that does not touch the guide produces no churn.
      - name: Compile user guide
        uses: xu-cheng/latex-action@v3
        env:
          SOURCE_DATE_EPOCH: '1700000000'
          FORCE_SOURCE_DATE: '1'
        with:
          working_directory: docs/userguide
          root_file: ADiGatorUserGuide.tex

      # PRs: publish the built PDF for review; do NOT commit it (that is what
      # caused the feature-branch churn / stacked-merge conflicts).
      - name: Upload PDF artifact (pull requests)
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: ADiGatorUserGuide-pdf
          path: docs/userguide/ADiGatorUserGuide.pdf
          if-no-files-found: error

      # master: commit the regenerated PDF (the single tracked copy). Only runs
      # when PDF_PUSH_TOKEN is configured; the checkout above used it, so the
      # auto-commit can push to the protected branch. Skipped cleanly otherwise.
      - name: Commit regenerated PDF (master only)
        if: ${{ github.event_name == 'push' && env.PDF_PUSH_TOKEN != '' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: docs/userguide/ADiGatorUserGuide.pdf
          commit_message: 'docs(userguide): regenerate PDF [skip ci]'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: '41898282+github-actions[bot]@users.noreply.github.com'
